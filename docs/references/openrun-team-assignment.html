<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OpenRun — Team Assignment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ─── DESIGN TOKENS ─────────────────────────────────────────────── */
  :root {
    --bg:             #0e0f0c;
    --bg-raised:      #161710;
    --bg-surface:     #1e2019;
    --bg-hover:       #252720;

    --accent:         #c8f135;
    --accent-dim:     #a0c228;
    --accent-glow:    rgba(200, 241, 53, 0.15);

    --text-primary:   #f0f0e8;
    --text-secondary: #8a8c7a;
    --text-muted:     #4a4c3e;

    --border:         #2a2c22;
    --border-accent:  rgba(200, 241, 53, 0.3);

    --radius-sm:  6px;
    --radius-md:  10px;
    --radius-lg:  16px;

    --font-display: 'Barlow Condensed', sans-serif;
    --font-body:    'Barlow', sans-serif;
  }

  /* ─── RESET ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE ─────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* ─── APP SHELL ─────────────────────────────────────────────────── */
  .app {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ─── TOPBAR ────────────────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .run-label {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .run-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .game-badge {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid var(--border-accent);
    padding: 4px 10px;
    border-radius: 4px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: var(--accent-glow);
  }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ─── BALANCE BAR ───────────────────────────────────────────────── */
  /* Shows how even the split is — the host's gut-check at a glance   */
  .balance-bar {
    margin: 16px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .balance-labels {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .balance-team {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .balance-team-name {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .balance-team-name.a { color: var(--accent-dim); }

  .balance-count {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--text-secondary);
    line-height: 1;
    transition: color 0.2s;
  }

  .balance-count.a { color: var(--accent); }

  .balance-count.uneven {
    color: #ff6b35;
  }

  .balance-vs {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .balance-track {
    height: 4px;
    background: var(--bg-surface);
    border-radius: 2px;
    display: flex;
    gap: 2px;
    overflow: hidden;
  }

  .balance-fill-a {
    height: 100%;
    background: var(--accent);
    border-radius: 2px 0 0 2px;
    transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .balance-fill-b {
    height: 100%;
    background: var(--text-secondary);
    border-radius: 0 2px 2px 0;
    transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .balance-status {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
    transition: color 0.2s;
  }

  .balance-status.even { color: var(--accent-dim); }
  .balance-status.uneven { color: #ff6b35; }

  /* ─── TEAMS GRID ────────────────────────────────────────────────── */
  .teams-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding: 16px 20px 0;
    min-height: 0;
    overflow: hidden;
  }

  /* ─── TEAM COLUMN ───────────────────────────────────────────────── */
  .team-col {
    display: flex;
    flex-direction: column;
    gap: 0;
    min-height: 0;
  }

  .team-col:first-child {
    padding-right: 6px;
    border-right: 1px solid var(--border);
  }

  .team-col:last-child {
    padding-left: 6px;
  }

  .team-col-header {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  .team-col-header.a {
    color: var(--accent-dim);
    border-color: var(--border-accent);
  }

  /* ─── DROP ZONE ─────────────────────────────────────────────────── */
  .drop-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    min-height: 120px;
    border-radius: var(--radius-md);
    padding: 4px 2px;
    transition: background 0.15s, border-color 0.15s;
  }

  .drop-zone.drag-active {
    background: rgba(200, 241, 53, 0.04);
    outline: 1px dashed var(--border-accent);
    outline-offset: -2px;
  }

  /* ─── ASSIGNMENT CARD ───────────────────────────────────────────── */
  .assign-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 9px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: grab;
    transition: border-color 0.12s, transform 0.12s, background 0.12s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    flex-shrink: 0;
  }

  .assign-card:active { cursor: grabbing; }

  .assign-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-glow);
    opacity: 0;
    transition: opacity 0.12s;
  }

  .assign-card:hover {
    border-color: var(--border-accent);
    transform: translateY(-1px);
  }

  .assign-card:hover::before { opacity: 1; }

  /* Dragging state */
  .assign-card.dragging {
    opacity: 0.35;
    transform: scale(0.97);
    border-color: var(--border-accent);
  }

  /* Drop target highlight */
  .assign-card.drag-over {
    border-color: var(--accent-dim);
    background: var(--bg-hover);
    transform: translateY(-2px);
  }

  /* Flash when dropped into a new column */
  .assign-card.just-moved {
    animation: move-flash 0.35s ease-out;
  }

  @keyframes move-flash {
    0%   { background: rgba(200, 241, 53, 0.2); border-color: var(--accent); }
    100% { background: var(--bg-surface); border-color: var(--border); }
  }

  /* Drag grip icon */
  .assign-grip {
    color: var(--text-muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    transition: color 0.12s;
    position: relative;
    z-index: 1;
  }
  .assign-card:hover .assign-grip { color: var(--text-secondary); }
  .assign-grip svg { width: 11px; height: 11px; }

  /* Player name */
  .assign-name {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1;
    flex: 1;
    position: relative;
    z-index: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  /* Move to other team arrow button */
  .assign-move {
    width: 24px;
    height: 24px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-hover);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .assign-move:hover {
    border-color: var(--text-muted);
    color: var(--text-secondary);
  }
  .assign-move svg { width: 11px; height: 11px; }

  /* ─── SECTION HEADER ────────────────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 10px;
    flex-shrink: 0;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .section-action {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-dim);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    transition: color 0.12s;
  }
  .section-action:hover { color: var(--accent); }

  /* ─── BOTTOM BAR ────────────────────────────────────────────────── */
  .bottom-bar {
    padding: 12px 20px 24px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
    flex-shrink: 0;
  }

  /* Scramble — secondary action */
  .btn-scramble {
    height: 52px;
    padding: 0 18px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-secondary);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn-scramble:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
  }
  .btn-scramble.scrambling {
    border-color: var(--border-accent);
    color: var(--accent-dim);
  }
  .btn-scramble svg { width: 14px; height: 14px; }

  /* Confirm — primary action */
  .btn-primary {
    flex: 1;
    height: 52px;
    border-radius: var(--radius-md);
    border: none;
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary:hover {
    background: #d4f545;
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary svg { width: 16px; height: 16px; }

  /* ─── PAGE LOAD ANIMATIONS ──────────────────────────────────────── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .topbar       { animation: fade-up 0.3s 0.00s ease-out both; }
  .balance-bar  { animation: fade-up 0.3s 0.06s ease-out both; }
  .section-header { animation: fade-up 0.3s 0.10s ease-out both; }
  .teams-grid   { animation: fade-up 0.3s 0.14s ease-out both; }
  .bottom-bar   { animation: fade-up 0.3s 0.20s ease-out both; }

  /* ─── SCRAMBLE ANIMATION ────────────────────────────────────────── */
  @keyframes card-scramble {
    0%   { opacity: 1; transform: translateY(0); }
    30%  { opacity: 0; transform: translateY(-8px); }
    60%  { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .assign-card.scramble-anim {
    animation: card-scramble 0.4s ease-in-out both;
  }

  /* ─── SCROLLBAR ─────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="run-label">Friday Run</span>
      <span class="run-name">Rucker Park</span>
    </div>
    <div class="topbar-right">
      <span class="game-badge">Game 1</span>
      <button class="icon-btn" title="Back to lobby">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- BALANCE BAR -->
  <div class="balance-bar">
    <div class="balance-labels">
      <div class="balance-team">
        <span class="balance-team-name a">Runs</span>
        <span class="balance-count a" id="count-a">5</span>
      </div>
      <span class="balance-vs">vs</span>
      <div class="balance-team" style="align-items: flex-end;">
        <span class="balance-team-name">Next</span>
        <span class="balance-count" id="count-b">5</span>
      </div>
    </div>
    <div class="balance-track">
      <div class="balance-fill-a" id="balance-a" style="width: 50%"></div>
      <div class="balance-fill-b" id="balance-b" style="width: 50%"></div>
    </div>
    <span class="balance-status even" id="balance-status">Even split</span>
  </div>

  <!-- SECTION HEADER -->
  <div class="section-header" style="margin-top: 16px;">
    <span class="section-title">Drag to balance</span>
    <button class="section-action" onclick="scramble()">Scramble</button>
  </div>

  <!-- TEAMS GRID -->
  <div class="teams-grid">

    <!-- TEAM A -->
    <div class="team-col">
      <div class="team-col-header a">Runs</div>
      <div class="drop-zone" id="zone-a"
           ondragover="onDragOver(event, 'a')"
           ondragleave="onDragLeave(event, 'a')"
           ondrop="onDrop(event, 'a')">
      </div>
    </div>

    <!-- TEAM B -->
    <div class="team-col">
      <div class="team-col-header">Next</div>
      <div class="drop-zone" id="zone-b"
           ondragover="onDragOver(event, 'b')"
           ondragleave="onDragLeave(event, 'b')"
           ondrop="onDrop(event, 'b')">
      </div>
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="btn-scramble" id="scramble-btn" onclick="scramble()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/>
        <line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/>
        <line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
      Scramble
    </button>
    <button class="btn-primary" onclick="confirmTeams()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Confirm
    </button>
  </div>

</div>

<script>
  /* ─── STATE ─────────────────────────────────────────────────────── */
  const players = [
    { id: 1,  name: 'Marcus'  },
    { id: 2,  name: 'Kel'     },
    { id: 3,  name: 'Tone'    },
    { id: 4,  name: 'D. Webb' },
    { id: 5,  name: 'Junie'   },
    { id: 6,  name: 'Dre'     },
    { id: 7,  name: 'Ray'     },
    { id: 8,  name: 'Big Ty'  },
    { id: 9,  name: 'C. Mills'},
    { id: 10, name: 'Poke'    },
  ];

  // Default split: first 5 → A, next 5 → B
  let teams = {
    a: players.slice(0, 5).map(p => p.id),
    b: players.slice(5, 10).map(p => p.id),
  };

  let dragId = null;
  let dragOrigin = null;

  /* ─── BUILD A CARD ──────────────────────────────────────────────── */
  function buildCard(playerId, team) {
    const player = players.find(p => p.id === playerId);
    const card = document.createElement('div');
    card.className = 'assign-card';
    card.draggable = true;
    card.dataset.id = playerId;
    card.dataset.team = team;

    const teamList = teams[team];
    const pos = teamList.indexOf(playerId) + 1;
    const arrowTeam = team === 'a' ? 'b' : 'a';
    const arrowTitle = team === 'a' ? 'Move to Next' : 'Move to Runs';
    const arrowIcon = team === 'a'
      ? `<polyline points="9 18 15 12 9 6"/>`
      : `<polyline points="15 18 9 12 15 6"/>`;

    card.innerHTML = `
      <div class="assign-grip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </div>
      <span class="assign-name">${player.name}</span>
      <button class="assign-move" title="${arrowTitle}" onclick="movePlayer(${playerId}, '${arrowTeam}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          ${arrowIcon}
        </svg>
      </button>
    `;

    // Drag events
    card.addEventListener('dragstart', (e) => {
      dragId = playerId;
      dragOrigin = team;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      dragId = null;
      dragOrigin = null;
    });

    return card;
  }

  /* ─── RENDER BOTH ZONES ─────────────────────────────────────────── */
  function render() {
    const zoneA = document.getElementById('zone-a');
    const zoneB = document.getElementById('zone-b');
    zoneA.innerHTML = '';
    zoneB.innerHTML = '';

    teams.a.forEach(id => zoneA.appendChild(buildCard(id, 'a')));
    teams.b.forEach(id => zoneB.appendChild(buildCard(id, 'b')));

    updateBalance();
  }

  /* ─── MOVE WITH BUTTON ──────────────────────────────────────────── */
  function movePlayer(playerId, toTeam) {
    const fromTeam = toTeam === 'a' ? 'b' : 'a';
    teams[fromTeam] = teams[fromTeam].filter(id => id !== playerId);
    teams[toTeam].push(playerId);
    render();

    // Flash the moved card
    const zone = document.getElementById(`zone-${toTeam}`);
    const card = zone.querySelector(`[data-id="${playerId}"]`);
    if (card) {
      card.classList.add('just-moved');
      setTimeout(() => card.classList.remove('just-moved'), 350);
    }
  }

  /* ─── DRAG AND DROP ─────────────────────────────────────────────── */
  function onDragOver(e, team) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.getElementById(`zone-${team}`).classList.add('drag-active');
  }

  function onDragLeave(e, team) {
    // Only remove if truly leaving the zone
    const zone = document.getElementById(`zone-${team}`);
    if (!zone.contains(e.relatedTarget)) {
      zone.classList.remove('drag-active');
    }
  }

  function onDrop(e, toTeam) {
    e.preventDefault();
    document.getElementById(`zone-${toTeam}`).classList.remove('drag-active');
    if (dragId === null) return;
    if (dragOrigin === toTeam) return; // Same team — no-op

    movePlayer(dragId, toTeam);
  }

  /* ─── SCRAMBLE ──────────────────────────────────────────────────── */
  function scramble() {
    const btn = document.getElementById('scramble-btn');
    btn.classList.add('scrambling');
    btn.disabled = true;

    // Animate all cards out
    document.querySelectorAll('.assign-card').forEach((card, i) => {
      card.style.animationDelay = `${i * 30}ms`;
      card.classList.add('scramble-anim');
    });

    setTimeout(() => {
      // Shuffle all player IDs
      const all = [...teams.a, ...teams.b];
      for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
      }
      const half = Math.ceil(all.length / 2);
      teams.a = all.slice(0, half);
      teams.b = all.slice(half);
      render();

      btn.classList.remove('scrambling');
      btn.disabled = false;
    }, 350);
  }

  /* ─── BALANCE ───────────────────────────────────────────────────── */
  function updateBalance() {
    const cntA = teams.a.length;
    const cntB = teams.b.length;
    const total = cntA + cntB;

    document.getElementById('count-a').textContent = cntA;
    document.getElementById('count-b').textContent = cntB;

    const pctA = total > 0 ? (cntA / total) * 100 : 50;
    const pctB = total > 0 ? (cntB / total) * 100 : 50;

    document.getElementById('balance-a').style.width = `${pctA}%`;
    document.getElementById('balance-b').style.width = `${pctB}%`;

    const statusEl = document.getElementById('balance-status');
    const countAEl = document.getElementById('count-a');
    const countBEl = document.getElementById('count-b');
    const diff = Math.abs(cntA - cntB);

    if (diff === 0) {
      statusEl.textContent = 'Even split';
      statusEl.className = 'balance-status even';
      countAEl.classList.remove('uneven');
      countBEl.classList.remove('uneven');
    } else if (diff === 1) {
      statusEl.textContent = 'Off by one';
      statusEl.className = 'balance-status';
      countAEl.classList.remove('uneven');
      countBEl.classList.remove('uneven');
    } else {
      statusEl.textContent = `${diff} apart`;
      statusEl.className = 'balance-status uneven';
      if (cntA > cntB) {
        countAEl.classList.add('uneven');
        countBEl.classList.remove('uneven');
      } else {
        countBEl.classList.add('uneven');
        countAEl.classList.remove('uneven');
      }
    }
  }

  /* ─── CONFIRM ───────────────────────────────────────────────────── */
  function confirmTeams() {
    // In production: navigate to game screen
    alert(`Teams confirmed.\nRuns: ${teams.a.map(id => players.find(p => p.id === id).name).join(', ')}\nNext: ${teams.b.map(id => players.find(p => p.id === id).name).join(', ')}`);
  }

  /* ─── INIT ──────────────────────────────────────────────────────── */
  render();
</script>
</body>
</html>
