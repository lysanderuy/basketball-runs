<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OpenRun — Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ─── DESIGN TOKENS ─────────────────────────────────────────────── */
  :root {
    --bg:             #0e0f0c;
    --bg-raised:      #161710;
    --bg-surface:     #1e2019;
    --bg-hover:       #252720;

    --accent:         #c8f135;
    --accent-dim:     #a0c228;
    --accent-glow:    rgba(200, 241, 53, 0.15);

    --text-primary:   #f0f0e8;
    --text-secondary: #8a8c7a;
    --text-muted:     #4a4c3e;

    --border:         #2a2c22;
    --border-accent:  rgba(200, 241, 53, 0.3);

    --radius-sm:  6px;
    --radius-md:  10px;
    --radius-lg:  16px;

    --font-display: 'Barlow Condensed', sans-serif;
    --font-body:    'Barlow', sans-serif;
  }

  /* ─── RESET ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE ─────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* ─── APP SHELL ─────────────────────────────────────────────────── */
  .app {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ─── TOPBAR ────────────────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .run-label {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .run-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .game-badge {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid var(--border-accent);
    padding: 4px 10px;
    border-radius: 4px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: var(--accent-glow);
  }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ─── VIEW MODE TOGGLE — demo only ─────────────────────────────── */
  .mode-toggle {
    display: flex;
    gap: 6px;
    padding: 12px 20px 0;
    flex-shrink: 0;
  }

  .mode-btn {
    flex: 1;
    height: 32px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-muted);
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.12s;
  }

  .mode-btn.active {
    border-color: var(--border-accent);
    background: var(--accent-glow);
    color: var(--accent-dim);
  }

  /* ─── QUEUE STATS STRIP ─────────────────────────────────────────── */
  .stats-strip {
    display: flex;
    gap: 0;
    margin: 14px 20px 0;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    flex-shrink: 0;
  }

  .stat-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 10px 8px;
  }

  .stat-item + .stat-item {
    border-left: 1px solid var(--border);
  }

  .stat-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    line-height: 1;
  }

  .stat-value.accent { color: var(--accent); }

  /* ─── SCROLL BODY ───────────────────────────────────────────────── */
  .queue-body {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 24px;
  }

  /* ─── SECTION BLOCK ─────────────────────────────────────────────── */
  .queue-section {
    margin-top: 20px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 8px;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Section count pill */
  .section-count {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 3px;
  }

  .section-count.active {
    color: var(--accent-dim);
    background: var(--accent-glow);
    border-color: var(--border-accent);
  }

  /* ─── QUEUE LIST ────────────────────────────────────────────────── */
  .queue-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ─── QUEUE ITEM ────────────────────────────────────────────────── */
  .queue-item {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 11px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
  }

  /* On Court items — subtle accent tint */
  .queue-item.on-court {
    border-color: var(--border-accent);
    background: rgba(200, 241, 53, 0.04);
  }

  /* Marked out — visually dimmed */
  .queue-item.marked-out {
    opacity: 0.45;
  }

  .queue-item.marked-out .queue-name {
    text-decoration: line-through;
    text-decoration-color: var(--text-muted);
  }

  /* New join flash */
  .queue-item.just-joined {
    animation: join-flash 0.6s ease-out;
  }

  @keyframes join-flash {
    0%   { border-color: var(--accent); background: rgba(200, 241, 53, 0.12); }
    100% { border-color: var(--border); background: var(--bg-surface); }
  }

  /* ─── DRAG HANDLE ───────────────────────────────────────────────── */
  .drag-handle {
    color: var(--text-muted);
    cursor: grab;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    transition: color 0.12s;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle:hover  { color: var(--text-secondary); }
  .drag-handle svg { width: 12px; height: 12px; }

  /* Hidden for on-court and read-only views */
  .drag-handle.hidden { visibility: hidden; pointer-events: none; }

  /* ─── POSITION NUMBER ───────────────────────────────────────────── */
  .queue-pos {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
    line-height: 1;
  }

  .queue-item.on-court .queue-pos {
    color: var(--accent-dim);
  }

  /* ─── PLAYER NAME ───────────────────────────────────────────────── */
  .queue-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  /* ─── GAMES PLAYED ──────────────────────────────────────────────── */
  .queue-games {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* ─── ROW ACTIONS — host only ───────────────────────────────────── */
  .queue-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .queue-action-btn {
    width: 30px;
    height: 30px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-hover);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .queue-action-btn:hover {
    border-color: var(--text-muted);
    color: var(--text-secondary);
  }
  .queue-action-btn.danger:hover {
    border-color: #ff4040;
    color: #ff6060;
    background: rgba(255, 64, 64, 0.08);
  }
  .queue-action-btn.accent-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: var(--accent-glow);
  }
  .queue-action-btn svg { width: 13px; height: 13px; }

  /* ─── CONTEXT MENU ──────────────────────────────────────────────── */
  /* Appears on long press / more button tap */
  .ctx-menu {
    position: fixed;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 6px;
    min-width: 160px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
    flex-direction: column;
    gap: 2px;
  }

  .ctx-menu.visible {
    display: flex;
    animation: ctx-in 0.15s ease-out both;
  }

  @keyframes ctx-in {
    from { opacity: 0; transform: scale(0.95) translateY(-4px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .ctx-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-secondary);
    transition: background 0.1s, color 0.1s;
    user-select: none;
  }

  .ctx-item:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  .ctx-item.danger {
    color: #ff6060;
  }
  .ctx-item.danger:hover {
    background: rgba(255, 64, 64, 0.08);
    color: #ff8080;
  }

  .ctx-item svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .ctx-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Click outside overlay */
  .ctx-overlay {
    position: fixed;
    inset: 0;
    z-index: 99;
    display: none;
  }
  .ctx-overlay.visible { display: block; }

  /* ─── DRAG STATES ───────────────────────────────────────────────── */
  .queue-item.dragging {
    opacity: 0.35;
    border-color: var(--border-accent);
  }

  .queue-item.drag-over {
    border-color: var(--accent-dim);
    background: var(--bg-hover);
    transform: translateY(-1px);
  }

  /* ─── PAGE LOAD ANIMATIONS ──────────────────────────────────────── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .topbar      { animation: fade-up 0.3s 0.00s ease-out both; }
  .mode-toggle { animation: fade-up 0.3s 0.04s ease-out both; }
  .stats-strip { animation: fade-up 0.3s 0.08s ease-out both; }
  .queue-body  { animation: fade-up 0.3s 0.12s ease-out both; }

  /* ─── SCROLLBAR ─────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── READ ONLY — player/spectator ─────────────────────────────── */
  .read-only .drag-handle     { display: none; }
  .read-only .queue-actions   { display: none; }
  .read-only .queue-item      { cursor: default; }
</style>
</head>

<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="run-label">Friday Run</span>
      <span class="run-name">Rucker Park</span>
    </div>
    <div class="topbar-right">
      <span class="game-badge">Game 4</span>
      <button class="icon-btn" title="Add player" id="add-btn" onclick="addPlayer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- VIEW MODE TOGGLE — demo only -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-host" onclick="setMode('host')">Host</button>
    <button class="mode-btn" id="btn-player" onclick="setMode('player')">Player</button>
  </div>

  <!-- STATS STRIP -->
  <div class="stats-strip">
    <div class="stat-item">
      <span class="stat-label">On court</span>
      <span class="stat-value accent" id="stat-court">10</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Up next</span>
      <span class="stat-value" id="stat-next">5</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Waiting</span>
      <span class="stat-value" id="stat-waiting">3</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Total</span>
      <span class="stat-value" id="stat-total">18</span>
    </div>
  </div>

  <!-- QUEUE BODY -->
  <div class="queue-body" id="queue-body">

    <!-- ON COURT -->
    <div class="queue-section">
      <div class="section-header">
        <span class="section-title">
          On Court
          <span class="section-count active">10</span>
        </span>
      </div>
      <div class="queue-list" id="list-court">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- UP NEXT -->
    <div class="queue-section">
      <div class="section-header">
        <span class="section-title">
          Up Next
          <span class="section-count" id="count-next">5</span>
        </span>
      </div>
      <div class="queue-list" id="list-next">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- WAITING -->
    <div class="queue-section">
      <div class="section-header">
        <span class="section-title">
          Waiting
          <span class="section-count" id="count-waiting">3</span>
        </span>
      </div>
      <div class="queue-list" id="list-waiting">
        <!-- Rendered by JS -->
      </div>
    </div>

  </div>

</div>

<!-- CONTEXT MENU -->
<div class="ctx-overlay" id="ctx-overlay" onclick="closeCtx()"></div>
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" onclick="ctxAction('rename')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Rename
  </div>
  <div class="ctx-item" id="ctx-markout" onclick="ctxAction('markout')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
    </svg>
    Mark Out
  </div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" onclick="ctxAction('remove')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6M14 11v6"/>
      <path d="M9 6V4h6v2"/>
    </svg>
    Remove
  </div>
</div>

<script>
  /* ─── DATA ──────────────────────────────────────────────────────── */
  let players = [
    // On court — locked
    { id: 1,  name: 'Marcus',  games: 3, section: 'court',   out: false },
    { id: 2,  name: 'Kel',     games: 3, section: 'court',   out: false },
    { id: 3,  name: 'Tone',    games: 3, section: 'court',   out: false },
    { id: 4,  name: 'D. Webb', games: 2, section: 'court',   out: false },
    { id: 5,  name: 'Junie',   games: 2, section: 'court',   out: false },
    { id: 6,  name: 'Dre',     games: 3, section: 'court',   out: false },
    { id: 7,  name: 'Ray',     games: 2, section: 'court',   out: false },
    { id: 8,  name: 'Big Ty',  games: 1, section: 'court',   out: false },
    { id: 9,  name: 'C. Mills',games: 1, section: 'court',   out: false },
    { id: 10, name: 'Poke',    games: 1, section: 'court',   out: false },
    // Up next
    { id: 11, name: 'Flash',   games: 2, section: 'next',    out: false },
    { id: 12, name: 'J. Rock', games: 1, section: 'next',    out: false },
    { id: 13, name: 'Smooth',  games: 1, section: 'next',    out: false },
    { id: 14, name: 'T. Davis',games: 0, section: 'next',    out: false },
    { id: 15, name: 'Lil K',   games: 0, section: 'next',    out: false },
    // Waiting
    { id: 16, name: 'Buckets', games: 0, section: 'waiting', out: false },
    { id: 17, name: 'K. Price',games: 0, section: 'waiting', out: false },
    { id: 18, name: 'Mike D',  games: 0, section: 'waiting', out: false },
  ];

  let nextId = 19;
  let mode = 'host'; // 'host' | 'player'
  let ctxTargetId = null;
  let dragId = null;
  let dragSection = null;

  const newNames = ['Speedy', 'Ice', 'Deuce', 'Money', 'Showtime', 'Clutch'];
  let nameIdx = 0;

  /* ─── RENDER ────────────────────────────────────────────────────── */
  function render() {
    const sections = ['court', 'next', 'waiting'];
    sections.forEach(sec => {
      const list = document.getElementById(`list-${sec}`);
      const sectionPlayers = players.filter(p => p.section === sec);
      list.innerHTML = '';
      sectionPlayers.forEach((p, i) => {
        list.appendChild(buildItem(p, i + 1, sec));
      });
    });

    updateStats();
  }

  /* ─── BUILD QUEUE ITEM ──────────────────────────────────────────── */
  function buildItem(player, pos, section) {
    const isHost = mode === 'host';
    const isOnCourt = section === 'court';
    const canDrag = isHost && !isOnCourt;

    const item = document.createElement('div');
    item.className = `queue-item${isOnCourt ? ' on-court' : ''}${player.out ? ' marked-out' : ''}`;
    item.dataset.id = player.id;
    item.dataset.section = section;

    if (canDrag) {
      item.draggable = true;
      item.addEventListener('dragstart', onDragStart);
      item.addEventListener('dragend', onDragEnd);
      item.addEventListener('dragover', onDragOver);
      item.addEventListener('drop', onDrop);
    }

    const gamesLabel = player.games === 1 ? '1 game' : `${player.games} games`;

    item.innerHTML = `
      <div class="drag-handle${(!canDrag) ? ' hidden' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </div>
      <span class="queue-pos">${pos}</span>
      <span class="queue-name">${player.name}</span>
      <span class="queue-games">${gamesLabel}</span>
      ${isHost ? `
      <div class="queue-actions">
        ${player.out
          ? `<button class="queue-action-btn accent-btn" title="Reinstate" onclick="reinstate(${player.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
              </svg>
             </button>`
          : ''
        }
        <button class="queue-action-btn" title="More" onclick="openCtx(event, ${player.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/>
          </svg>
        </button>
      </div>` : ''}
    `;

    return item;
  }

  /* ─── STATS ─────────────────────────────────────────────────────── */
  function updateStats() {
    const court   = players.filter(p => p.section === 'court').length;
    const next    = players.filter(p => p.section === 'next').length;
    const waiting = players.filter(p => p.section === 'waiting').length;
    document.getElementById('stat-court').textContent   = court;
    document.getElementById('stat-next').textContent    = next;
    document.getElementById('stat-waiting').textContent = waiting;
    document.getElementById('stat-total').textContent   = players.length;
    document.getElementById('count-next').textContent   = next;
    document.getElementById('count-waiting').textContent = waiting;
  }

  /* ─── CONTEXT MENU ──────────────────────────────────────────────── */
  function openCtx(e, id) {
    e.stopPropagation();
    ctxTargetId = id;
    const player = players.find(p => p.id === id);

    // Update mark out label
    const markoutItem = document.getElementById('ctx-markout');
    if (player.out) {
      markoutItem.style.display = 'none';
    } else {
      markoutItem.style.display = 'flex';
    }

    const menu = document.getElementById('ctx-menu');
    const overlay = document.getElementById('ctx-overlay');
    const rect = e.currentTarget.getBoundingClientRect();

    menu.style.top  = `${Math.min(rect.bottom + 4, window.innerHeight - 180)}px`;
    menu.style.right = `${window.innerWidth - rect.right}px`;
    menu.style.left = 'auto';

    menu.classList.add('visible');
    overlay.classList.add('visible');
  }

  function closeCtx() {
    document.getElementById('ctx-menu').classList.remove('visible');
    document.getElementById('ctx-overlay').classList.remove('visible');
    ctxTargetId = null;
  }

  function ctxAction(action) {
    const player = players.find(p => p.id === ctxTargetId);
    closeCtx();
    if (!player) return;

    if (action === 'rename') {
      const newName = prompt('Rename player:', player.name);
      if (newName && newName.trim()) {
        player.name = newName.trim().toUpperCase();
        render();
      }
    } else if (action === 'markout') {
      player.out = true;
      render();
    } else if (action === 'remove') {
      if (confirm(`Remove ${player.name} from the queue?`)) {
        players = players.filter(p => p.id !== ctxTargetId);
        render();
      }
    }
  }

  /* ─── REINSTATE ─────────────────────────────────────────────────── */
  function reinstate(id) {
    const player = players.find(p => p.id === id);
    if (player) {
      player.out = false;
      render();
    }
  }

  /* ─── ADD PLAYER ────────────────────────────────────────────────── */
  function addPlayer() {
    const name = newNames[nameIdx % newNames.length];
    nameIdx++;
    players.push({
      id: nextId++,
      name,
      games: 0,
      section: 'waiting',
      out: false,
    });
    render();

    // Flash the new item
    setTimeout(() => {
      const list = document.getElementById('list-waiting');
      const last = list.lastElementChild;
      if (last) {
        last.classList.add('just-joined');
        last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }, 20);
  }

  /* ─── DRAG AND DROP (next + waiting only) ───────────────────────── */
  function onDragStart(e) {
    dragId = parseInt(this.dataset.id);
    dragSection = this.dataset.section;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function onDragEnd() {
    this.classList.remove('dragging');
    document.querySelectorAll('.queue-item').forEach(i => i.classList.remove('drag-over'));
    dragId = null;
    dragSection = null;
  }

  function onDragOver(e) {
    e.preventDefault();
    if (parseInt(this.dataset.id) !== dragId) {
      document.querySelectorAll('.queue-item').forEach(i => i.classList.remove('drag-over'));
      this.classList.add('drag-over');
    }
  }

  function onDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    const targetId = parseInt(this.dataset.id);
    if (dragId === null || dragId === targetId) return;

    const dragIdx  = players.findIndex(p => p.id === dragId);
    const targetIdx = players.findIndex(p => p.id === targetId);
    if (dragIdx === -1 || targetIdx === -1) return;

    // Move within same section only
    if (players[dragIdx].section !== players[targetIdx].section) return;

    const [dragged] = players.splice(dragIdx, 1);
    const newIdx = players.findIndex(p => p.id === targetId);
    players.splice(newIdx, 0, dragged);
    render();
  }

  /* ─── VIEW MODE ─────────────────────────────────────────────────── */
  function setMode(m) {
    mode = m;
    document.getElementById('btn-host').classList.toggle('active', m === 'host');
    document.getElementById('btn-player').classList.toggle('active', m === 'player');
    document.getElementById('add-btn').style.display = m === 'host' ? 'flex' : 'none';
    document.getElementById('queue-body').classList.toggle('read-only', m === 'player');
    render();
  }

  /* ─── INIT ──────────────────────────────────────────────────────── */
  render();
</script>
</body>
</html>
