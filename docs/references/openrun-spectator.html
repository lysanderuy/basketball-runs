<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OpenRun — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ─── DESIGN TOKENS ─────────────────────────────────────────────── */
  :root {
    --bg:             #0e0f0c;
    --bg-raised:      #161710;
    --bg-surface:     #1e2019;
    --bg-hover:       #252720;

    --accent:         #c8f135;
    --accent-dim:     #a0c228;
    --accent-glow:    rgba(200, 241, 53, 0.15);

    --text-primary:   #f0f0e8;
    --text-secondary: #8a8c7a;
    --text-muted:     #4a4c3e;

    --border:         #2a2c22;
    --border-accent:  rgba(200, 241, 53, 0.3);

    --radius-sm:  6px;
    --radius-md:  10px;
    --radius-lg:  16px;

    --font-display: 'Barlow Condensed', sans-serif;
    --font-body:    'Barlow', sans-serif;
  }

  /* ─── RESET ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE ─────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* ─── APP SHELL ─────────────────────────────────────────────────── */
  .app {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ─── TOPBAR ────────────────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .run-label {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .run-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .live-badge {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid var(--border-accent);
    padding: 4px 10px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Pulsing live dot */
  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: live-pulse 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes live-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  /* ─── SCOREBOARD ────────────────────────────────────────────────── */
  /* Larger than host view — this is pure reading, no tapping          */
  .scoreboard {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 20px;
    gap: 0;
  }

  .score-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
  }

  .team-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .team-label {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Hero score — bigger than host view */
  .score-number {
    font-family: var(--font-display);
    font-size: clamp(110px, 28vw, 180px);
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    user-select: none;
    transition: color 0.2s, transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .score-number.scored {
    color: var(--accent);
    transform: scale(1.05);
  }

  .score-goal {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Court center divider */
  .score-separator {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 16px;
  }

  .separator-dash {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 900;
    color: var(--text-muted);
    line-height: 1;
    letter-spacing: -0.04em;
  }

  /* ─── CLOCK ─────────────────────────────────────────────────────── */
  .clock-row {
    display: flex;
    justify-content: center;
    padding: 8px 20px 0;
    flex-shrink: 0;
  }

  .clock-display {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 0.06em;
    color: var(--accent);
    line-height: 1;
  }

  .clock-display.warning {
    color: #ff6b35;
    animation: pulse-warn 0.8s ease-in-out infinite;
  }

  @keyframes pulse-warn {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  /* ─── PROGRESS BAR ──────────────────────────────────────────────── */
  .score-progress {
    margin: 12px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-shrink: 0;
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .progress-label {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .progress-goal {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .progress-track {
    height: 5px;
    background: var(--bg-surface);
    border-radius: 3px;
    display: flex;
    gap: 3px;
  }

  .progress-fill-a {
    height: 100%;
    border-radius: 3px 0 0 3px;
    background: var(--accent);
    transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .progress-fill-b {
    height: 100%;
    border-radius: 0 3px 3px 0;
    background: var(--text-secondary);
    transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ─── RECENT LOG ────────────────────────────────────────────────── */
  .log-section {
    flex-shrink: 0;
    margin-top: 16px;
  }

  .section-header {
    display: flex;
    align-items: center;
    padding: 0 20px 8px;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .score-log {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .log-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--bg-surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    animation: slide-in 0.2s ease-out;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-team-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .log-team-dot.a { background: var(--accent); }
  .log-team-dot.b { background: var(--text-secondary); }

  .log-text {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
    flex: 1;
  }

  .log-score {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }

  /* ─── QUEUE POSITION — player only ─────────────────────────────── */
  .queue-position {
    margin: 16px 20px 0;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .queue-pos-left {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .queue-pos-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .queue-pos-value {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    line-height: 1;
  }

  /* When player is up next — accent highlight */
  .queue-position.up-next {
    border-color: var(--border-accent);
    background: rgba(200, 241, 53, 0.06);
  }

  .queue-position.up-next .queue-pos-label {
    color: var(--accent-dim);
  }

  .queue-position.up-next .queue-pos-value {
    color: var(--accent);
  }

  .queue-pos-status {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: right;
  }

  .queue-pos-status.active {
    color: var(--accent-dim);
  }

  /* ─── VIEW MODE TOGGLE — demo only ─────────────────────────────── */
  .mode-toggle {
    display: flex;
    gap: 8px;
    padding: 12px 20px 0;
    flex-shrink: 0;
  }

  .mode-btn {
    flex: 1;
    height: 32px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-muted);
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.12s;
  }

  .mode-btn.active {
    border-color: var(--border-accent);
    background: var(--accent-glow);
    color: var(--accent-dim);
  }

  /* ─── SPACER — pushes content up when queue strip is absent ────── */
  .bottom-spacer { height: 24px; flex-shrink: 0; }

  /* ─── PAGE LOAD ANIMATIONS ──────────────────────────────────────── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .topbar        { animation: fade-up 0.3s 0.00s ease-out both; }
  .mode-toggle   { animation: fade-up 0.3s 0.04s ease-out both; }
  .scoreboard    { animation: fade-up 0.3s 0.08s ease-out both; }
  .clock-row     { animation: fade-up 0.3s 0.12s ease-out both; }
  .score-progress{ animation: fade-up 0.3s 0.15s ease-out both; }
  .log-section   { animation: fade-up 0.3s 0.18s ease-out both; }
  .queue-position{ animation: fade-up 0.3s 0.22s ease-out both; }

  /* ─── SCROLLBAR ─────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="run-label">Friday Run</span>
      <span class="run-name">Rucker Park</span>
    </div>
    <div class="topbar-right">
      <span class="live-badge">
        <span class="live-dot"></span>
        Live
      </span>
    </div>
  </div>

  <!-- VIEW MODE TOGGLE — demo only, shows player vs spectator state -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-player" onclick="setMode('player')">Player view</button>
    <button class="mode-btn" id="btn-spectator" onclick="setMode('spectator')">Spectator view</button>
  </div>

  <!-- SCOREBOARD -->
  <div class="scoreboard">
    <div class="score-row">
      <div class="team-block">
        <span class="team-label">Runs</span>
        <span class="score-number" id="score-a">14</span>
        <span class="score-goal">to 21</span>
      </div>
      <div class="score-separator">
        <span class="separator-dash">—</span>
      </div>
      <div class="team-block">
        <span class="team-label">Next</span>
        <span class="score-number" id="score-b">11</span>
        <span class="score-goal">to 21</span>
      </div>
    </div>
  </div>

  <!-- CLOCK -->
  <div class="clock-row">
    <span class="clock-display" id="clock">12:47</span>
  </div>

  <!-- PROGRESS -->
  <div class="score-progress">
    <div class="progress-labels">
      <span class="progress-label">Runs — 14</span>
      <span class="progress-goal">Goal: 21</span>
      <span class="progress-label">11 — Next</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill-a" id="progress-a" style="width: calc(14/21 * 47%)"></div>
      <div class="progress-fill-b" id="progress-b" style="width: calc(11/21 * 47%)"></div>
    </div>
  </div>

  <!-- RECENT LOG -->
  <div class="log-section">
    <div class="section-header">
      <span class="section-title">Recent</span>
    </div>
    <div class="score-log" id="log">
      <div class="log-entry">
        <div class="log-team-dot a"></div>
        <span class="log-text">Marcus scored</span>
        <span class="log-score">14 – 11</span>
      </div>
      <div class="log-entry">
        <div class="log-team-dot b"></div>
        <span class="log-text">Dre scored</span>
        <span class="log-score">13 – 11</span>
      </div>
      <div class="log-entry">
        <div class="log-team-dot a"></div>
        <span class="log-text">Kel scored</span>
        <span class="log-score">13 – 10</span>
      </div>
    </div>
  </div>

  <!-- QUEUE POSITION — player only, hidden for spectator -->
  <div class="queue-position" id="queue-strip">
    <div class="queue-pos-left">
      <span class="queue-pos-label">Your position</span>
      <span class="queue-pos-value">#6 in queue</span>
    </div>
    <span class="queue-pos-status">~1 game away</span>
  </div>

  <div class="bottom-spacer"></div>

</div>

<script>
  /* ─── CLOCK ─────────────────────────────────────────────────────── */
  let clockSeconds = 767;
  const clockEl = document.getElementById('clock');

  setInterval(() => {
    clockSeconds--;
    if (clockSeconds < 0) clockSeconds = 0;
    const m = Math.floor(clockSeconds / 60);
    const s = clockSeconds % 60;
    clockEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
    clockEl.classList.toggle('warning', clockSeconds <= 60);
  }, 1000);

  /* ─── SIMULATED SCORE UPDATE ────────────────────────────────────── */
  /* Randomly scores every 8–14s to show the live update behavior     */
  const scores = { a: 14, b: 11 };
  const goal = 21;
  const logNames = {
    a: ['Marcus', 'Kel', 'Tone', 'D. Webb', 'Junie'],
    b: ['Dre', 'Ray', 'Big Ty', 'C. Mills', 'Poke'],
  };

  function randomScore() {
    const team = Math.random() > 0.5 ? 'a' : 'b';
    scores[team]++;

    // Flash score number
    const el = document.getElementById(`score-${team}`);
    el.textContent = scores[team];
    el.classList.add('scored');
    setTimeout(() => el.classList.remove('scored'), 300);

    // Update progress
    const half = 47;
    document.getElementById('progress-a').style.width =
      `calc(${Math.min(scores.a, goal)} / ${goal} * ${half}%)`;
    document.getElementById('progress-b').style.width =
      `calc(${Math.min(scores.b, goal)} / ${goal} * ${half}%)`;

    // Update progress labels
    document.querySelector('.progress-labels').children[0].textContent = `Runs — ${scores.a}`;
    document.querySelector('.progress-labels').children[2].textContent = `${scores.b} — Next`;

    // Add log entry
    const names = logNames[team];
    const name = names[Math.floor(Math.random() * names.length)];
    const log = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `
      <div class="log-team-dot ${team}"></div>
      <span class="log-text">${name} scored</span>
      <span class="log-score">${scores.a} – ${scores.b}</span>
    `;
    log.insertBefore(entry, log.firstChild);
    while (log.children.length > 3) log.removeChild(log.lastChild);

    // Schedule next
    if (scores.a < goal && scores.b < goal) {
      setTimeout(randomScore, 8000 + Math.random() * 6000);
    }
  }

  setTimeout(randomScore, 8000 + Math.random() * 6000);

  /* ─── VIEW MODE TOGGLE ──────────────────────────────────────────── */
  function setMode(mode) {
    const strip = document.getElementById('queue-strip');
    const btnPlayer = document.getElementById('btn-player');
    const btnSpectator = document.getElementById('btn-spectator');

    if (mode === 'player') {
      strip.style.display = 'flex';
      btnPlayer.classList.add('active');
      btnSpectator.classList.remove('active');
    } else {
      strip.style.display = 'none';
      btnPlayer.classList.remove('active');
      btnSpectator.classList.add('active');
    }
  }
</script>
</body>
</html>
