<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BallRuns — Lobby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ─── DESIGN TOKENS ─────────────────────────────────────────────── */
  :root {
    --bg:             #0e0f0c;
    --bg-raised:      #161710;
    --bg-surface:     #1e2019;
    --bg-hover:       #252720;

    --accent:         #c8f135;
    --accent-dim:     #a0c228;
    --accent-glow:    rgba(200, 241, 53, 0.15);

    --text-primary:   #f0f0e8;
    --text-secondary: #8a8c7a;
    --text-muted:     #4a4c3e;

    --border:         #2a2c22;
    --border-accent:  rgba(200, 241, 53, 0.3);

    --radius-sm:  6px;
    --radius-md:  10px;
    --radius-lg:  16px;

    --font-display: 'Barlow Condensed', sans-serif;
    --font-body:    'Barlow', sans-serif;
  }

  /* ─── RESET ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE ─────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* ─── APP SHELL ─────────────────────────────────────────────────── */
  .app {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ─── TOPBAR ────────────────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .topbar-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .run-label {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .run-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .game-badge {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid var(--border-accent);
    padding: 4px 10px;
    border-radius: 4px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: var(--accent-glow);
  }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ─── QR BLOCK ──────────────────────────────────────────────────── */
  .qr-block {
    margin: 20px 20px 0;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle accent glow behind QR — signals this is the call to action */
  .qr-block::before {
    content: '';
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    background: var(--accent-glow);
    border-radius: 50%;
    filter: blur(40px);
    pointer-events: none;
  }

  .qr-label {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    position: relative;
    z-index: 1;
  }

  /* QR Code — SVG placeholder that looks real */
  .qr-frame {
    position: relative;
    z-index: 1;
    width: 180px;
    height: 180px;
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--border-accent);
  }

  .qr-frame svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .qr-meta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
    z-index: 1;
  }

  .qr-code-label {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .qr-code-value {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    line-height: 1;
  }

  .qr-hint {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.4;
    max-width: 220px;
  }

  /* ─── FORMAT STRIP ──────────────────────────────────────────────── */
  .format-strip {
    margin: 12px 20px 0;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .format-left {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .format-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .format-value {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1.1;
  }

  .format-change {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }

  /* ─── QUEUE SECTION ─────────────────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 10px;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .section-meta {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .section-meta span {
    color: var(--text-secondary);
  }

  /* ─── QUEUE LIST ────────────────────────────────────────────────── */
  .queue-list {
    flex: 1;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
  }

  /* ─── QUEUE ITEM ────────────────────────────────────────────────── */
  .queue-item {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
  }

  /* New arrival animation */
  .queue-item.just-joined {
    animation: join-flash 0.6s ease-out;
  }

  @keyframes join-flash {
    0%   { border-color: var(--accent); background: rgba(200, 241, 53, 0.1); }
    100% { border-color: var(--border); background: var(--bg-surface); }
  }

  /* Position number */
  .queue-pos {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    width: 20px;
    text-align: center;
    flex-shrink: 0;
    line-height: 1;
  }

  /* Highlight first 10 positions — they're in the next game */
  .queue-item.in-next .queue-pos {
    color: var(--accent-dim);
  }

  /* Player name */
  .queue-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1;
    flex: 1;
  }

  /* Joined timestamp */
  .queue-time {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* Host action buttons on each row */
  .queue-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .queue-action-btn {
    width: 28px;
    height: 28px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-hover);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .queue-action-btn:hover {
    border-color: var(--text-muted);
    color: var(--text-secondary);
  }
  .queue-action-btn.remove:hover {
    border-color: #ff4040;
    color: #ff6060;
    background: rgba(255, 64, 64, 0.08);
  }
  .queue-action-btn svg {
    width: 12px;
    height: 12px;
  }

  /* Drag handle */
  .drag-handle {
    color: var(--text-muted);
    cursor: grab;
    display: flex;
    align-items: center;
    padding: 0 2px;
    flex-shrink: 0;
    transition: color 0.12s;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle:hover { color: var(--text-secondary); }
  .drag-handle svg { width: 12px; height: 12px; }

  /* ─── NEXT-GAME DIVIDER ─────────────────────────────────────────── */
  /* Separates the first 10 (playing next) from the rest of the queue */
  .next-game-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ─── EMPTY QUEUE STATE ─────────────────────────────────────────── */
  .queue-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 32px 20px;
    text-align: center;
  }

  .queue-empty-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
  }
  .queue-empty-icon svg { width: 18px; height: 18px; }

  .queue-empty-text {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .queue-empty-sub {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
    max-width: 200px;
  }

  /* ─── BOTTOM BAR ────────────────────────────────────────────────── */
  .bottom-bar {
    padding: 12px 20px 24px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }

  /* Primary action — Start Game */
  .btn-primary {
    flex: 1;
    height: 52px;
    border-radius: var(--radius-md);
    border: none;
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary:hover {
    background: #d4f545;
    transform: translateY(-1px);
  }
  .btn-primary:active {
    transform: scale(0.98);
  }
  .btn-primary:disabled {
    background: var(--bg-hover);
    color: var(--text-muted);
    border: 1px solid var(--border);
    cursor: not-allowed;
    transform: none;
  }
  .btn-primary svg { width: 16px; height: 16px; }

  /* Secondary — icon only */
  .btn-secondary {
    height: 52px;
    padding: 0 16px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-secondary);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-secondary:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
  }
  .btn-secondary svg { width: 14px; height: 14px; }

  /* ─── PAGE LOAD ANIMATIONS ──────────────────────────────────────── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .topbar        { animation: fade-up 0.3s 0.00s ease-out both; }
  .qr-block      { animation: fade-up 0.3s 0.06s ease-out both; }
  .format-strip  { animation: fade-up 0.3s 0.10s ease-out both; }
  .section-header{ animation: fade-up 0.3s 0.14s ease-out both; }
  .queue-list    { animation: fade-up 0.3s 0.18s ease-out both; }
  .bottom-bar    { animation: fade-up 0.3s 0.22s ease-out both; }

  /* ─── SCROLLBAR ─────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── DRAG STATE ────────────────────────────────────────────────── */
  .queue-item.dragging {
    opacity: 0.4;
    border-color: var(--border-accent);
  }

  .queue-item.drag-over {
    border-color: var(--accent-dim);
    background: var(--bg-hover);
  }
</style>
</head>

<div class="app">

      <span class="run-label">Friday Run</span>
      <span class="run-name">Rucker Park</span>

    <div class="qr-frame">

        <rect x="30" y="13" width="2" height="1" fill="#0e0f0c"/>
        <rect x="9" y="15" width="2" height="1" fill="#0e0f0c"/>
        <rect x="13" y="15" width="1" height="1" fill="#0e0f0c"/>
        <rect x="16" y="15" width="3" height="1" fill="#0e0f0c"/>
        <rect x="22" y="15" width="2" height="1" fill="#0e0f0c"/>

  /* ─── STATE ─────────────────────────────────────────────────────── */
  const state = {
    players: [
      { id: 1, name: 'Marcus',  time: '2m ago'   },
      { id: 2, name: 'Kel',     time: '2m ago'   },
      { id: 3, name: 'Tone',    time: '3m ago'   },
      { id: 4, name: 'D. Webb', time: '4m ago'   },
      { id: 5, name: 'Junie',   time: '5m ago'   },
      { id: 6, name: 'Dre',     time: '6m ago'   },
      { id: 7, name: 'Ray',     time: '7m ago'   },
      { id: 8, name: 'Big Ty',  time: 'Just now' },
    ],
    nextId: 9,
    maxNextGame: 10,
  };

  const newNames = ['Poke', 'C. Mills', 'J. Rock', 'Smooth', 'T. Davis', 'Lil K', 'Flash', 'Buckets'];
  let nameIdx = 0;

  /* ─── REMOVE PLAYER ─────────────────────────────────────────────── */
  function removePlayer(btn) {
    const item = btn.closest('.queue-item');
    item.style.transition = 'opacity 0.2s, transform 0.2s';
    item.style.opacity = '0';
    item.style.transform = 'translateX(12px)';
    setTimeout(() => {
      item.remove();
      reindex();
    }, 200);
  }

  /* ─── SIMULATE JOIN ─────────────────────────────────────────────── */
  function simulateJoin() {
    const name = newNames[nameIdx % newNames.length];
    nameIdx++;

    const list = document.getElementById('queue-list');
    const items = list.querySelectorAll('.queue-item');
    const pos = items.length + 1;

    const item = document.createElement('div');
    item.className = 'queue-item just-joined';
    item.draggable = true;
    item.dataset.id = state.nextId++;
    item.innerHTML = `
      <div class="drag-handle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </div>
      <span class="queue-pos">${pos}</span>
      <span class="queue-name">${name}</span>
      <span class="queue-time">Just now</span>
      <div class="queue-actions">
        <button class="queue-action-btn remove" title="Remove" onclick="removePlayer(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    `;

    // Insert before divider if exists, otherwise append
    const divider = list.querySelector('.next-game-divider');
    list.appendChild(item);

    // Attach drag events
    attachDrag(item);
    reindex();

    // Scroll to new item
    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /* ─── REINDEX POSITIONS ─────────────────────────────────────────── */
  function reindex() {
    const list = document.getElementById('queue-list');
    const items = list.querySelectorAll('.queue-item');
    let count = 0;
    items.forEach((item, i) => {
      count++;
      item.querySelector('.queue-pos').textContent = count;
      // First 10 get in-next styling
      if (count <= state.maxNextGame) {
        item.classList.add('in-next');
      } else {
        item.classList.remove('in-next');
      }
    });
    document.getElementById('queue-count').textContent = count;
  }

  /* ─── DRAG AND DROP ─────────────────────────────────────────────── */
  let dragSrc = null;

  function attachDrag(el) {
    el.addEventListener('dragstart', (e) => {
      dragSrc = el;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.queue-item').forEach(i => i.classList.remove('drag-over'));
      reindex();
    });

    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (el !== dragSrc) {
        document.querySelectorAll('.queue-item').forEach(i => i.classList.remove('drag-over'));
        el.classList.add('drag-over');
      }
    });

    el.addEventListener('drop', (e) => {
      e.preventDefault();
      if (dragSrc && dragSrc !== el) {
        const list = document.getElementById('queue-list');
        const allItems = [...list.querySelectorAll('.queue-item')];
        const srcIdx = allItems.indexOf(dragSrc);
        const tgtIdx = allItems.indexOf(el);
        if (srcIdx < tgtIdx) {
          el.after(dragSrc);
        } else {
          el.before(dragSrc);
        }
      }
      el.classList.remove('drag-over');
    });
  }

  // Attach drag to existing items
  document.querySelectorAll('.queue-item').forEach(attachDrag);
</script>
</body>
</html>
